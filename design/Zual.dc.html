<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html,body{height:100%;margin:0;background:#F6EBDD;}
  #dc-root{height:100%;}
  *{box-sizing:border-box;}
  @keyframes bob{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes twinkle{0%,100%{opacity:0.35;}50%{opacity:1;}}
  @keyframes breathe{0%,100%{transform:scale(1);}50%{transform:scale(1.05);}}
  ::-webkit-scrollbar{width:0;height:0;}
</style>
</helmet>

<div style="position:relative;width:100%;height:100%;min-height:100%;background:#F6EBDD;font-family:Quicksand,system-ui,sans-serif;color:#4B4038;overflow:hidden;">

  <!-- ============================ SETUP ============================ -->
  <sc-if value="{{ isSetup }}" hint-placeholder-val="{{ true }}">
  <div style="position:absolute;inset:0;display:flex;flex-direction:column;">

    <!-- shared header -->
    <div style="padding:52px 24px 8px;text-align:center;flex:0 0 auto;">
      <div style="font-family:'Baloo 2',cursive;font-weight:700;font-size:36px;color:#7FA87A;letter-spacing:0.5px;line-height:1;">Zual</div>
      <div style="font-size:13px;color:#93826F;font-weight:500;margin-top:4px;">a gentle timer for little ones</div>
    </div>

    <!-- ---------- LAYOUT A ---------- -->
    <sc-if value="{{ layoutA }}" hint-placeholder-val="{{ true }}">
    <div style="flex:1 1 auto;overflow-y:auto;padding:12px 22px 4px;display:flex;flex-direction:column;gap:26px;">

      <div>
        <div style="font-size:16px;font-weight:700;color:#4B4038;margin:0 0 14px 2px;">How long?</div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
          <sc-for list="{{ durations }}" as="d" hint-placeholder-count="5">
            <button onClick="{{ d.pick }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:16px 6px;display:flex;flex-direction:column;align-items:center;gap:0;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;color:#4B4038;" style-hover="background:#FFF7E9;">
              <span style="font-size:30px;font-weight:700;line-height:1.05;">{{ d.minutes }}</span>
              <span style="font-size:12px;font-weight:600;color:#93826F;">min</span>
              <sc-if value="{{ d.sel }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
            </button>
          </sc-for>
          <button onClick="{{ toggleCustom }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:16px 6px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;color:#4B4038;" style-hover="background:#FFF7E9;">
            <span style="font-size:19px;font-weight:700;line-height:1.05;">Custom</span>
            <span style="font-size:11px;font-weight:600;color:#93826F;">set your own</span>
            <sc-if value="{{ showCustom }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
          </button>
        </div>
        <sc-if value="{{ showCustom }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-top:14px;background:#FFFCF6;border-radius:22px;padding:14px;box-shadow:0 2px 6px rgba(75,64,56,0.05);">
            <button onClick="{{ decCustom }}" style="width:48px;height:48px;border-radius:50%;border:none;background:#F1E6D3;color:#4B4038;font-size:26px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;">−</button>
            <div style="display:flex;flex-direction:column;align-items:center;min-width:74px;"><span style="font-size:36px;font-weight:700;line-height:1;">{{ customMin }}</span><span style="font-size:12px;font-weight:600;color:#93826F;">minutes</span></div>
            <button onClick="{{ incCustom }}" style="width:48px;height:48px;border-radius:50%;border:none;background:#F1E6D3;color:#4B4038;font-size:26px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;">+</button>
          </div>
        </sc-if>
      </div>

      <div>
        <div style="font-size:16px;font-weight:700;color:#4B4038;margin:0 0 14px 2px;">Pick a scene</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">

          <button onClick="{{ pickDisc }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;" style-hover="background:#FFF7E9;">
            <div style="position:relative;height:74px;border-radius:16px;background:#F3E8D6;display:flex;align-items:center;justify-content:center;overflow:hidden;"><div style="width:44px;height:44px;border-radius:50%;background:#7FA87A;box-shadow:0 3px 8px rgba(127,168,122,0.4);"></div></div>
            <span style="font-size:13px;font-weight:700;color:#4B4038;text-align:left;padding-left:2px;">Shrinking disc</span>
            <sc-if value="{{ selDisc }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
          </button>

          <button onClick="{{ pickSunrise }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;" style-hover="background:#FFF7E9;">
            <div style="position:relative;height:74px;border-radius:16px;background:linear-gradient(180deg,#2B335F 0%,#7C6E86 55%,#F4C79A 100%);overflow:hidden;"><div style="position:absolute;left:14px;top:14px;width:4px;height:4px;border-radius:50%;background:#fff;opacity:0.8;"></div><div style="position:absolute;right:24px;top:22px;width:3px;height:3px;border-radius:50%;background:#fff;opacity:0.7;"></div><div style="position:absolute;left:50%;bottom:10px;transform:translateX(-50%);width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#FFE9AE,#F3AE44);box-shadow:0 0 14px 5px rgba(247,193,91,0.55);"></div></div>
            <span style="font-size:13px;font-weight:700;color:#4B4038;text-align:left;padding-left:2px;">Night to sunrise</span>
            <sc-if value="{{ selSunrise }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
          </button>

          <button onClick="{{ pickWalk }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;" style-hover="background:#FFF7E9;">
            <div style="position:relative;height:74px;border-radius:16px;background:linear-gradient(180deg,#BFE0EE,#E9F2E0);overflow:hidden;">
              <div style="position:absolute;left:0;right:0;bottom:0;height:26px;background:#CFE0A8;"></div>
              <div style="position:absolute;right:10px;bottom:20px;width:32px;"><div style="width:0;height:0;border-left:16px solid transparent;border-right:16px solid transparent;border-bottom:12px solid #C98A5E;margin:0 auto;"></div><div style="width:26px;height:20px;background:#EAD7B8;border-radius:4px;margin:-1px auto 0;"></div></div>
              <div style="position:absolute;left:12px;bottom:22px;"><div style="width:12px;height:12px;border-radius:50%;background:#F0C9A0;margin:0 auto;"></div><div style="width:16px;height:16px;background:#E0805F;border-radius:8px 8px 4px 4px;margin:-2px auto 0;"></div></div>
            </div>
            <span style="font-size:13px;font-weight:700;color:#4B4038;text-align:left;padding-left:2px;">Walking home</span>
            <sc-if value="{{ selWalk }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
          </button>

          <button onClick="{{ pickCar }}" style="position:relative;border:none;cursor:pointer;background:#FFFCF6;border-radius:22px;padding:10px;display:flex;flex-direction:column;gap:8px;box-shadow:0 2px 6px rgba(75,64,56,0.05);font-family:inherit;" style-hover="background:#FFF7E9;">
            <div style="position:relative;height:74px;border-radius:16px;background:linear-gradient(180deg,#F6D9A8,#F3E3C4);overflow:hidden;">
              <div style="position:absolute;left:0;right:0;bottom:0;height:22px;background:#5A5048;"></div>
              <div style="position:absolute;bottom:10px;left:0;right:0;height:3px;background:repeating-linear-gradient(90deg,#E9D9B8 0 8px,transparent 8px 16px);"></div>
              <div style="position:absolute;left:14px;bottom:16px;"><div style="position:relative;width:40px;height:16px;background:#DE6A4B;border-radius:8px 8px 4px 4px;"><div style="position:absolute;top:-8px;left:8px;width:20px;height:10px;background:#F0B49B;border-radius:6px 6px 0 0;"></div></div><div style="position:absolute;bottom:-4px;left:5px;width:10px;height:10px;border-radius:50%;background:#3A3230;"></div><div style="position:absolute;bottom:-4px;left:24px;width:10px;height:10px;border-radius:50%;background:#3A3230;"></div></div>
            </div>
            <span style="font-size:13px;font-weight:700;color:#4B4038;text-align:left;padding-left:2px;">Car on a road</span>
            <sc-if value="{{ selCar }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:22px;pointer-events:none;"></span></sc-if>
          </button>

        </div>
      </div>
    </div>

    <div style="padding:14px 22px 26px;flex:0 0 auto;">
      <button onClick="{{ start }}" style="width:100%;border:none;cursor:pointer;background:#7FA87A;color:#FFFDF7;border-radius:26px;padding:20px;font-size:21px;font-weight:700;font-family:inherit;box-shadow:0 8px 20px rgba(127,168,122,0.4);display:flex;align-items:center;justify-content:center;gap:10px;" style-hover="background:#6E9A68;">
        Start <span style="opacity:0.85;font-size:15px;font-weight:600;">· {{ chosenMin }} min</span>
      </button>
    </div>
    </sc-if>

    <!-- ---------- LAYOUT B ---------- -->
    <sc-if value="{{ layoutB }}" hint-placeholder-val="{{ false }}">
    <div style="flex:1 1 auto;overflow-y:auto;padding:12px 20px 24px;display:flex;flex-direction:column;gap:16px;">

      <div style="background:#FFFCF6;border-radius:26px;padding:18px 18px 20px;box-shadow:0 2px 8px rgba(75,64,56,0.06);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#7FA87A;color:#fff;font-size:14px;font-weight:700;">1</span><span style="font-size:16px;font-weight:700;">Choose a length</span></div>
        <div style="display:flex;gap:10px;overflow-x:auto;padding:2px 0 4px;">
          <sc-for list="{{ durations }}" as="d" hint-placeholder-count="5">
            <button onClick="{{ d.pick }}" style="position:relative;flex:0 0 auto;width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;background:#F6EBDD;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:inherit;color:#4B4038;box-shadow:inset 0 0 0 2px rgba(75,64,56,0.07);" style-hover="background:#F1E6D3;">
              <span style="font-size:21px;font-weight:700;line-height:1;">{{ d.minutes }}</span>
              <span style="font-size:9px;font-weight:600;color:#93826F;">min</span>
              <sc-if value="{{ d.sel }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 3px #7FA87A;pointer-events:none;"></span></sc-if>
            </button>
          </sc-for>
          <button onClick="{{ toggleCustom }}" style="position:relative;flex:0 0 auto;width:62px;height:62px;border-radius:50%;border:none;cursor:pointer;background:#F6EBDD;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:inherit;color:#4B4038;box-shadow:inset 0 0 0 2px rgba(75,64,56,0.07);" style-hover="background:#F1E6D3;">
            <span style="font-size:15px;font-weight:700;line-height:1;">Set</span>
            <span style="font-size:9px;font-weight:600;color:#93826F;">custom</span>
            <sc-if value="{{ showCustom }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border-radius:50%;box-shadow:inset 0 0 0 3px #7FA87A;pointer-events:none;"></span></sc-if>
          </button>
        </div>
        <sc-if value="{{ showCustom }}" hint-placeholder-val="{{ false }}">
          <div style="display:flex;align-items:center;justify-content:center;gap:20px;margin-top:14px;background:#F6EBDD;border-radius:20px;padding:12px;">
            <button onClick="{{ decCustom }}" style="width:46px;height:46px;border-radius:50%;border:none;background:#F1E6D3;color:#4B4038;font-size:26px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;">−</button>
            <div style="display:flex;flex-direction:column;align-items:center;min-width:70px;"><span style="font-size:32px;font-weight:700;line-height:1;">{{ customMin }}</span><span style="font-size:11px;font-weight:600;color:#93826F;">minutes</span></div>
            <button onClick="{{ incCustom }}" style="width:46px;height:46px;border-radius:50%;border:none;background:#F1E6D3;color:#4B4038;font-size:26px;font-weight:700;cursor:pointer;font-family:inherit;line-height:1;">+</button>
          </div>
        </sc-if>
      </div>

      <div style="background:#FFFCF6;border-radius:26px;padding:18px;box-shadow:0 2px 8px rgba(75,64,56,0.06);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#7FA87A;color:#fff;font-size:14px;font-weight:700;">2</span><span style="font-size:16px;font-weight:700;">Choose a scene</span></div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;">

          <button onClick="{{ pickDisc }}" style="border:none;cursor:pointer;background:transparent;padding:0;display:flex;flex-direction:column;gap:6px;align-items:center;font-family:inherit;">
            <div style="position:relative;width:100%;height:58px;border-radius:14px;background:#F3E8D6;display:flex;align-items:center;justify-content:center;overflow:hidden;"><div style="width:32px;height:32px;border-radius:50%;background:#7FA87A;"></div><sc-if value="{{ selDisc }}" hint-placeholder-val="{{ true }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:14px;"></span></sc-if></div>
            <span style="font-size:10px;font-weight:600;color:#4B4038;">Disc</span>
          </button>

          <button onClick="{{ pickSunrise }}" style="border:none;cursor:pointer;background:transparent;padding:0;display:flex;flex-direction:column;gap:6px;align-items:center;font-family:inherit;">
            <div style="position:relative;width:100%;height:58px;border-radius:14px;background:linear-gradient(180deg,#2B335F,#7C6E86 55%,#F4C79A);overflow:hidden;"><div style="position:absolute;left:50%;bottom:8px;transform:translateX(-50%);width:22px;height:22px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#FFE9AE,#F3AE44);box-shadow:0 0 10px 4px rgba(247,193,91,0.55);"></div><sc-if value="{{ selSunrise }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:14px;"></span></sc-if></div>
            <span style="font-size:10px;font-weight:600;color:#4B4038;">Sunrise</span>
          </button>

          <button onClick="{{ pickWalk }}" style="border:none;cursor:pointer;background:transparent;padding:0;display:flex;flex-direction:column;gap:6px;align-items:center;font-family:inherit;">
            <div style="position:relative;width:100%;height:58px;border-radius:14px;background:linear-gradient(180deg,#BFE0EE,#E9F2E0);overflow:hidden;"><div style="position:absolute;left:0;right:0;bottom:0;height:20px;background:#CFE0A8;"></div><div style="position:absolute;right:6px;bottom:16px;width:24px;"><div style="width:0;height:0;border-left:12px solid transparent;border-right:12px solid transparent;border-bottom:10px solid #C98A5E;margin:0 auto;"></div><div style="width:20px;height:14px;background:#EAD7B8;border-radius:3px;margin:-1px auto 0;"></div></div><div style="position:absolute;left:8px;bottom:18px;"><div style="width:10px;height:10px;border-radius:50%;background:#F0C9A0;margin:0 auto;"></div><div style="width:13px;height:12px;background:#E0805F;border-radius:6px 6px 3px 3px;margin:-2px auto 0;"></div></div><sc-if value="{{ selWalk }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:14px;"></span></sc-if></div>
            <span style="font-size:10px;font-weight:600;color:#4B4038;">Walk home</span>
          </button>

          <button onClick="{{ pickCar }}" style="border:none;cursor:pointer;background:transparent;padding:0;display:flex;flex-direction:column;gap:6px;align-items:center;font-family:inherit;">
            <div style="position:relative;width:100%;height:58px;border-radius:14px;background:linear-gradient(180deg,#F6D9A8,#F3E3C4);overflow:hidden;"><div style="position:absolute;left:0;right:0;bottom:0;height:18px;background:#5A5048;"></div><div style="position:absolute;left:8px;bottom:14px;"><div style="position:relative;width:32px;height:13px;background:#DE6A4B;border-radius:6px 6px 3px 3px;"><div style="position:absolute;top:-6px;left:7px;width:15px;height:8px;background:#F0B49B;border-radius:4px 4px 0 0;"></div></div><div style="position:absolute;bottom:-3px;left:4px;width:8px;height:8px;border-radius:50%;background:#3A3230;"></div><div style="position:absolute;bottom:-3px;left:19px;width:8px;height:8px;border-radius:50%;background:#3A3230;"></div></div><sc-if value="{{ selCar }}" hint-placeholder-val="{{ false }}"><span style="position:absolute;inset:0;border:3px solid #7FA87A;border-radius:14px;"></span></sc-if></div>
            <span style="font-size:10px;font-weight:600;color:#4B4038;">Car ride</span>
          </button>

        </div>
      </div>

      <div style="background:#FFFCF6;border-radius:26px;padding:18px;box-shadow:0 2px 8px rgba(75,64,56,0.06);">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;"><span style="display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:#7FA87A;color:#fff;font-size:14px;font-weight:700;">3</span><span style="font-size:16px;font-weight:700;">Start the timer</span></div>
        <button onClick="{{ start }}" style="width:100%;border:none;cursor:pointer;background:#7FA87A;color:#FFFDF7;border-radius:22px;padding:20px;font-size:21px;font-weight:700;font-family:inherit;box-shadow:0 8px 20px rgba(127,168,122,0.4);display:flex;align-items:center;justify-content:center;gap:10px;" style-hover="background:#6E9A68;">Start <span style="opacity:0.85;font-size:15px;font-weight:600;">· {{ chosenMin }} min</span></button>
      </div>

    </div>
    </sc-if>

  </div>
  </sc-if>

  <!-- ============================ TIMER ============================ -->
  <sc-if value="{{ inTimer }}" hint-placeholder-val="{{ false }}">
  <div onPointerDown="{{ holdStart }}" onPointerUp="{{ holdEnd }}" onPointerLeave="{{ holdEnd }}" onPointerCancel="{{ holdEnd }}" style="position:absolute;inset:0;overflow:hidden;user-select:none;touch-action:none;">

    <!-- Theme: shrinking disc -->
    <sc-if value="{{ isDisc }}" hint-placeholder-val="{{ true }}">
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#F6EBDD;">
      <div style="position:relative;width:340px;height:340px;display:flex;align-items:center;justify-content:center;">
        <sc-if value="{{ trackRing }}" hint-placeholder-val="{{ true }}"><div style="position:absolute;width:310px;height:310px;border-radius:50%;border:2px dashed rgba(75,64,56,0.14);"></div></sc-if>
        <div style="{{ discStyle }}"></div>
      </div>
    </div>
    </sc-if>

    <!-- Theme: night to sunrise -->
    <sc-if value="{{ isSunrise }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;overflow:hidden;">
      <div style="{{ skyStyle }}"></div>
      <div style="{{ starsWrapStyle }}">
        <sc-for list="{{ stars }}" as="st" hint-placeholder-count="0">
          <div style="position:absolute;left:{{ st.left }};top:{{ st.top }};width:4px;height:4px;border-radius:50%;background:#fff;opacity:{{ st.d }};box-shadow:0 0 6px rgba(255,255,255,0.8);animation:twinkle 3s ease-in-out infinite;animation-delay:{{ st.delay }};"></div>
        </sc-for>
      </div>
      <div style="{{ moonStyle }}"></div>
      <div style="{{ sunStyle }}"></div>
      <div style="{{ hillStyle }}"></div>
    </div>
    </sc-if>

    <!-- Theme: walking home -->
    <sc-if value="{{ isWalk }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;overflow:hidden;background:linear-gradient(180deg,#BFE0EE 0%,#DCEAEF 45%,#E9F2E0 63%);">
      <div style="position:absolute;left:40px;top:80px;width:70px;height:26px;border-radius:20px;background:rgba(255,255,255,0.7);"></div>
      <div style="position:absolute;right:50px;top:150px;width:54px;height:20px;border-radius:16px;background:rgba(255,255,255,0.6);"></div>
      <div style="position:absolute;left:0;right:0;bottom:0;height:34%;background:#CFE0A8;"></div>
      <div style="position:absolute;left:0;right:0;bottom:20%;height:22px;background:#E4D3A6;"></div>
      <div style="position:absolute;right:26px;bottom:calc(20% + 6px);width:130px;"><div style="width:0;height:0;border-left:70px solid transparent;border-right:70px solid transparent;border-bottom:48px solid #C98A5E;margin:0 auto;"></div><div style="width:112px;height:92px;background:#EAD7B8;border-radius:10px;margin:-2px auto 0;position:relative;"><div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:36px;height:52px;background:#B5794E;border-radius:10px 10px 0 0;"></div><div style="position:absolute;top:16px;left:16px;width:22px;height:22px;background:#F6D9A8;border-radius:5px;"></div></div></div>
      <div style="position:absolute;bottom:calc(20% + 10px);left:{{ walkerLeft }};transform:translateX(-50%);transition:left 0.12s linear;">
        <div style="animation:bob 0.62s ease-in-out infinite;transform-origin:bottom center;">
          <div style="width:38px;height:38px;border-radius:50%;background:#F0C9A0;margin:0 auto;position:relative;"><div style="position:absolute;top:14px;left:9px;width:5px;height:5px;border-radius:50%;background:#4B4038;"></div><div style="position:absolute;top:14px;right:9px;width:5px;height:5px;border-radius:50%;background:#4B4038;"></div></div>
          <div style="width:50px;height:52px;background:#E0805F;border-radius:24px 24px 16px 16px;margin:-8px auto 0;"></div>
        </div>
      </div>
    </div>
    </sc-if>

    <!-- Theme: car on a road -->
    <sc-if value="{{ isCar }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;inset:0;overflow:hidden;background:linear-gradient(180deg,#F6D9A8 0%,#F5E4C4 55%,#EFDCBC 66%);">
      <div style="position:absolute;left:0;right:0;bottom:0;height:32%;background:#5A5048;"></div>
      <div style="position:absolute;left:0;right:0;bottom:calc(16% - 3px);height:6px;background:repeating-linear-gradient(90deg,#E9D9B8 0 26px,transparent 26px 52px);"></div>
      <div style="position:absolute;right:26px;bottom:calc(32% - 2px);width:130px;"><div style="width:0;height:0;border-left:70px solid transparent;border-right:70px solid transparent;border-bottom:48px solid #C98A5E;margin:0 auto;"></div><div style="width:112px;height:88px;background:#EAD7B8;border-radius:10px;margin:-2px auto 0;position:relative;"><div style="position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:36px;height:50px;background:#B5794E;border-radius:10px 10px 0 0;"></div></div></div>
      <div style="position:absolute;bottom:calc(16% + 6px);left:{{ carLeft }};transform:translateX(-50%);transition:left 0.12s linear;">
        <div style="position:relative;">
          <div style="position:relative;width:110px;height:42px;background:#DE6A4B;border-radius:18px 18px 12px 12px;box-shadow:0 4px 10px rgba(0,0,0,0.15);"><div style="position:absolute;top:-20px;left:24px;width:56px;height:26px;background:#F0B49B;border-radius:14px 14px 0 0;"></div><div style="position:absolute;top:14px;right:12px;width:8px;height:8px;border-radius:50%;background:#FFE9AE;"></div></div>
          <div style="position:absolute;bottom:-11px;left:16px;width:28px;height:28px;border-radius:50%;background:#3A3230;border:6px solid #6B5E58;animation:spin 0.7s linear infinite;"></div>
          <div style="position:absolute;bottom:-11px;left:66px;width:28px;height:28px;border-radius:50%;background:#3A3230;border:6px solid #6B5E58;animation:spin 0.7s linear infinite;"></div>
        </div>
      </div>
    </div>
    </sc-if>

    <!-- completed pill -->
    <sc-if value="{{ isDone }}" hint-placeholder-val="{{ false }}">
    <div style="position:absolute;left:0;right:0;bottom:38px;display:flex;justify-content:center;pointer-events:none;">
      <button onClick="{{ backToSetup }}" style="pointer-events:auto;border:none;cursor:pointer;background:rgba(255,253,247,0.94);backdrop-filter:blur(6px);color:#4B4038;border-radius:24px;padding:15px 28px;font-size:16px;font-weight:700;font-family:inherit;box-shadow:0 8px 24px rgba(0,0,0,0.12);animation:breathe 2.8s ease-in-out infinite;">All done — tap when ready</button>
    </div>
    </sc-if>

    <!-- hidden parent controls (revealed by long-press) -->
    <sc-if value="{{ controlsOpen }}" hint-placeholder-val="{{ false }}">
    <div onClick="{{ closeControls }}" style="position:absolute;inset:0;background:rgba(40,32,26,0.42);backdrop-filter:blur(3px);display:flex;align-items:flex-end;justify-content:center;z-index:20;">
      <div onClick="{{ stop }}" style="width:100%;background:#FBF4E8;border-radius:30px 30px 0 0;padding:22px 24px 30px;box-shadow:0 -10px 40px rgba(0,0,0,0.25);">
        <div style="width:44px;height:5px;border-radius:3px;background:#DBCDB6;margin:0 auto 18px;"></div>
        <div style="font-size:16px;font-weight:700;text-align:center;margin-bottom:18px;color:#4B4038;">Parent controls</div>
        <div style="display:flex;gap:12px;">
          <button onClick="{{ togglePause }}" style="flex:1;border:none;cursor:pointer;background:#7FA87A;color:#fff;border-radius:20px;padding:18px;font-size:16px;font-weight:700;font-family:inherit;" style-hover="background:#6E9A68;">{{ pauseLabel }}</button>
          <button onClick="{{ backToSetup }}" style="flex:1;border:none;cursor:pointer;background:#E0805F;color:#fff;border-radius:20px;padding:18px;font-size:16px;font-weight:700;font-family:inherit;" style-hover="background:#D06E4C;">End timer</button>
        </div>
        <button onClick="{{ closeControls }}" style="width:100%;margin-top:12px;border:none;cursor:pointer;background:transparent;color:#93826F;padding:12px;font-size:15px;font-weight:600;font-family:inherit;">Keep watching</button>
      </div>
    </div>
    </sc-if>

  </div>
  </sc-if>

</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 420, &quot;height&quot;: 880 },
  &quot;setupLayout&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;], &quot;default&quot;: &quot;A&quot;, &quot;tsType&quot;: &quot;'A'|'B'&quot;, &quot;section&quot;: &quot;Setup&quot;, &quot;label&quot;: &quot;Setup layout&quot; },
  &quot;soundOn&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Behavior&quot;, &quot;label&quot;: &quot;End chime&quot; },
  &quot;showTrackRing&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Disc theme&quot;, &quot;label&quot;: &quot;Show size ring&quot; }
}">
class Component extends DCLogic {
  state = {
    phase: 'setup', theme: 'disc', durationMin: 5, customMin: 3,
    showCustom: false, progress: 0, controlsOpen: false, paused: false
  };

  mix(a, b, t) {
    t = Math.max(0, Math.min(1, t));
    const pc = h => [parseInt(h.slice(1, 3), 16), parseInt(h.slice(3, 5), 16), parseInt(h.slice(5, 7), 16)];
    const A = pc(a), B = pc(b);
    const c = A.map((v, i) => Math.round(v + (B[i] - v) * t));
    return 'rgb(' + c[0] + ',' + c[1] + ',' + c[2] + ')';
  }

  discColor(r) {
    const green = '#7FA87A', yellow = '#E8B75A', red = '#DE6A4B';
    if (r > 0.5) return green;
    if (r > 0.2) return this.mix(yellow, green, (r - 0.2) / 0.3);
    return this.mix(red, yellow, r / 0.2);
  }

  minutes() { return this.state.showCustom ? this.state.customMin : this.state.durationMin; }

  start() {
    this.totalMs = Math.max(1, this.minutes()) * 60000;
    this.startTs = performance.now();
    this.pausedTotal = 0; this.paused = false; this.pauseStart = 0;
    try {
      this.audio = this.audio || new (window.AudioContext || window.webkitAudioContext)();
      if (this.audio.state === 'suspended') this.audio.resume();
    } catch (e) {}
    this.setState({ phase: 'running', progress: 0, controlsOpen: false, paused: false }, () => {
      cancelAnimationFrame(this.raf);
      this.raf = requestAnimationFrame(this.tick);
    });
  }

  tick = (now) => {
    if (this.state.phase !== 'running') return;
    if (!this.paused) {
      const elapsed = now - this.startTs - this.pausedTotal;
      let p = elapsed / this.totalMs;
      if (p >= 1) { this.setState({ progress: 1 }); this.finish(); return; }
      this.setState({ progress: p });
    }
    this.raf = requestAnimationFrame(this.tick);
  }

  finish() {
    cancelAnimationFrame(this.raf);
    this.playChime();
    this.setState({ phase: 'done', progress: 1, controlsOpen: false });
  }

  togglePause() {
    if (this.paused) {
      this.pausedTotal += performance.now() - this.pauseStart;
      this.paused = false;
      this.setState({ paused: false });
      cancelAnimationFrame(this.raf);
      this.raf = requestAnimationFrame(this.tick);
    } else {
      this.paused = true;
      this.pauseStart = performance.now();
      this.setState({ paused: true });
    }
  }

  backToSetup() {
    cancelAnimationFrame(this.raf);
    this.paused = false;
    this.setState({ phase: 'setup', progress: 0, controlsOpen: false, paused: false });
  }

  holdStart = () => {
    if (this.state.phase !== 'running') return;
    clearTimeout(this.holdT);
    this.holdT = setTimeout(() => this.setState({ controlsOpen: true }), 850);
  }
  holdEnd = () => { clearTimeout(this.holdT); }
  closeControls = () => this.setState({ controlsOpen: false });

  playChime() {
    if (!(this.props.soundOn ?? true)) return;
    try {
      const ctx = this.audio || new (window.AudioContext || window.webkitAudioContext)();
      this.audio = ctx;
      [{ f: 587.33, t: 0 }, { f: 783.99, t: 0.3 }].forEach(n => {
        const o = ctx.createOscillator(), g = ctx.createGain();
        o.type = 'sine'; o.frequency.value = n.f;
        const t0 = ctx.currentTime + n.t;
        g.gain.setValueAtTime(0, t0);
        g.gain.linearRampToValueAtTime(0.16, t0 + 0.06);
        g.gain.exponentialRampToValueAtTime(0.0008, t0 + 1.1);
        o.connect(g).connect(ctx.destination);
        o.start(t0); o.stop(t0 + 1.25);
      });
    } catch (e) {}
  }

  componentDidMount() {
    const p = this.props;
    if (p && p.demoPhase) {
      const st = { phase: p.demoPhase };
      if (p.demoTheme) st.theme = p.demoTheme;
      if (p.demoProgress != null) st.progress = parseFloat(p.demoProgress);
      if (p.demoControls === true || p.demoControls === 'true') st.controlsOpen = true;
      this.setState(st);
    }
  }

  componentWillUnmount() { cancelAnimationFrame(this.raf); clearTimeout(this.holdT); }

  renderVals() {
    const s = this.state;
    const p = s.progress, r = Math.max(0, 1 - p);
    const layout = this.props.setupLayout ?? 'A';
    const running = s.phase === 'running' && !this.paused;

    const durations = [1, 5, 10, 15, 30].map(m => ({
      minutes: m,
      sel: !s.showCustom && s.durationMin === m,
      pick: () => this.setState({ durationMin: m, showCustom: false })
    }));

    const discStyle = {
      width: '300px', height: '300px', borderRadius: '50%',
      background: this.discColor(r),
      transform: 'scale(' + Math.max(0.001, r) + ')',
      transition: running ? 'transform 0.12s linear, background 0.4s linear' : 'none',
      boxShadow: '0 20px 55px rgba(0,0,0,0.10)'
    };

    const skyStyle = {
      position: 'absolute', inset: 0,
      background: 'linear-gradient(180deg, ' + this.mix('#182449', '#8FC9EA', p) + ' 0%, ' + this.mix('#3A2F5C', '#FFDBA6', p) + ' 100%)',
      transition: 'background 0.4s linear'
    };
    const starsWrapStyle = { position: 'absolute', inset: 0, opacity: Math.max(0, 1 - p * 2.3), transition: 'opacity 0.5s linear' };
    const moonStyle = {
      position: 'absolute', top: '12%', right: '18%', width: '72px', height: '72px', borderRadius: '50%',
      background: '#EDE7D6', boxShadow: 'inset -12px -8px 0 rgba(0,0,0,0.06), 0 0 30px rgba(237,231,214,0.5)',
      opacity: Math.max(0, 1 - p * 1.7), transition: 'opacity 0.6s linear'
    };
    const sunStyle = {
      position: 'absolute', left: '50%', top: (86 - p * 64) + '%', transform: 'translate(-50%,-50%)',
      width: '130px', height: '130px', borderRadius: '50%',
      background: 'radial-gradient(circle at 50% 40%, #FFE9AE, #F3AE44)',
      boxShadow: '0 0 ' + (40 + p * 90) + 'px ' + (12 + p * 46) + 'px rgba(247,193,91,' + (0.3 + p * 0.5) + ')',
      transition: 'top 0.12s linear, box-shadow 0.4s linear'
    };
    const hillStyle = {
      position: 'absolute', left: '-25%', right: '-25%', bottom: '-70px', height: '210px', borderRadius: '50%',
      background: this.mix('#26314F', '#6E9060', p), transition: 'background 0.4s linear'
    };

    const leftPct = (6 + p * 62) + '%';

    const stars = [...Array(28)].map((_, i) => ({
      left: ((i * 37) % 100) + '%',
      top: (4 + (i * 53) % 44) + '%',
      d: (0.55 + ((i * 13) % 40) / 90),
      delay: ((i % 6) * 0.5) + 's'
    }));

    return {
      isSetup: s.phase === 'setup',
      inTimer: s.phase === 'running' || s.phase === 'done',
      isDone: s.phase === 'done',
      layoutA: layout === 'A', layoutB: layout === 'B',
      isDisc: s.theme === 'disc', isSunrise: s.theme === 'sunrise', isWalk: s.theme === 'walk', isCar: s.theme === 'car',
      durations,
      showCustom: s.showCustom, customMin: s.customMin,
      toggleCustom: () => this.setState({ showCustom: !s.showCustom }),
      incCustom: () => this.setState({ customMin: Math.min(120, s.customMin + 1) }),
      decCustom: () => this.setState({ customMin: Math.max(1, s.customMin - 1) }),
      pickDisc: () => this.setState({ theme: 'disc' }),
      pickSunrise: () => this.setState({ theme: 'sunrise' }),
      pickWalk: () => this.setState({ theme: 'walk' }),
      pickCar: () => this.setState({ theme: 'car' }),
      selDisc: s.theme === 'disc', selSunrise: s.theme === 'sunrise', selWalk: s.theme === 'walk', selCar: s.theme === 'car',
      start: () => this.start(),
      chosenMin: s.showCustom ? s.customMin : s.durationMin,
      trackRing: this.props.showTrackRing ?? true,
      controlsOpen: s.controlsOpen, paused: s.paused,
      pauseLabel: s.paused ? 'Resume' : 'Pause',
      holdStart: this.holdStart, holdEnd: this.holdEnd, closeControls: this.closeControls,
      togglePause: () => this.togglePause(), backToSetup: () => this.backToSetup(),
      stop: (e) => e.stopPropagation(),
      discStyle, skyStyle, starsWrapStyle, moonStyle, sunStyle, hillStyle, stars,
      walkerLeft: leftPct, carLeft: leftPct
    };
  }
}
</script>
